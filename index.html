<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigTicket - Dashboard de Reportes</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FF6600 0%, #cc5200 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 10px;
        }

        h1 {
            color: #FF6600;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #FF6600;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .chart-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #FF6600;
        }

        .table-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #FF6600;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #fff3e0;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success {
            background: #4caf50;
            color: white;
        }

        .badge-warning {
            background: #ffc107;
            color: #333;
        }

        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .filter-item label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .filter-item input,
        .filter-item select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 10px 25px;
            background: #FF6600;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #cc5200;
        }

        .btn-secondary {
            background: #666;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        /* MODAL PARA VER DETALLE DE REPORTE */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #FF6600;
        }

        .modal-header-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            color: #FF6600;
        }

        .btn-export-excel {
            padding: 8px 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-export-excel:hover {
            background: #45a049;
        }

        .modal-close {
            background: #f44336;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        .detail-section {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .detail-section h3 {
            color: #FF6600;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #FF6600;
            padding-bottom: 8px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .detail-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #FF6600;
        }

        .detail-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .codigos-table {
            width: 100%;
            margin-top: 10px;
        }

        .codigos-table th {
            background: #FF6600;
            color: white;
            padding: 10px;
            text-align: left;
        }

        .codigos-table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .codigos-table tr:hover {
            background: #fff3e0;
        }

        .btn-ver-detalle {
            padding: 6px 12px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .btn-ver-detalle:hover {
            background: #1976d2;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-group {
                flex-direction: column;
            }
            
            .filter-item {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🚛 BIGTICKET LOGÍSTICA</h1>
            <p class="subtitle">Dashboard de Reportes de Escaneo</p>
        </div>

        <!-- FILTROS -->
        <div class="filters">
            <div class="filter-group">
                <div class="filter-item">
                    <label>📅 Fecha Desde:</label>
                    <input type="date" id="fechaDesde">
                </div>
                <div class="filter-item">
                    <label>📅 Fecha Hasta:</label>
                    <input type="date" id="fechaHasta">
                </div>
                <div class="filter-item">
                    <label>🏢 Bodega:</label>
                    <select id="filtroBodega">
                        <option value="">Todas las bodegas</option>
                    </select>
                </div>
                <div class="filter-item" style="display: flex; gap: 10px; align-items: flex-end;">
                    <button class="btn" onclick="aplicarFiltros()">🔍 Filtrar</button>
                    <button class="btn btn-secondary" onclick="limpiarFiltros()">🔄 Limpiar</button>
                    <button class="btn btn-secondary" onclick="exportarExcel()">📥 Exportar</button>
                </div>
            </div>
        </div>

        <!-- ESTADÍSTICAS -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalReportes">0</div>
                <div class="stat-label">Total Reportes</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="totalBultos">0</div>
                <div class="stat-label">Total Bultos</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-value" id="sinCargas">0</div>
                <div class="stat-label">Sin Cargas</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="encargadosActivos">0</div>
                <div class="stat-label">Encargados Activos</div>
            </div>
        </div>

        <!-- GRÁFICOS -->
        <div class="charts-grid">
            <div class="chart-card" style="grid-column: 1 / 2;">
                <h3 class="chart-title">📈 Códigos Escaneados por Día</h3>
                <canvas id="chartCodigosPorDia"></canvas>
            </div>
            <div class="chart-card" style="grid-column: 2 / 3;">
                <h3 class="chart-title">🏢 Códigos Escaneados por Bodega</h3>
                <div id="totalBodegaDisplay" style="text-align: center; font-size: 14px; color: #666; margin-bottom: 10px;">
                    <!-- Se muestra el total aquí -->
                </div>
                <canvas id="chartCodigosPorBodega"></canvas>
            </div>
        </div>

        <!-- TABLA DE REPORTES -->
        <div class="table-card">
            <h3 class="chart-title">📋 Últimos Reportes</h3>
            <div id="tableContainer">
                <div class="loading">Cargando datos...</div>
            </div>
        </div>
    </div>

    <!-- MODAL DETALLE DE REPORTE -->
    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-left">
                    <h2 class="modal-title">📦 Detalle del Reporte</h2>
                    <button class="btn-export-excel" id="btnExportarDetalle" onclick="exportarDetalleExcel()">
                        📥 Descargar Excel
                    </button>
                </div>
                <button class="modal-close" onclick="cerrarModal()">×</button>
            </div>
            
            <div id="modalBody">
                <!-- El contenido se carga dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN - REEMPLAZAR CON TU URL DE GOOGLE SHEETS
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwjaua58YgR8oaGO55GSft3T-0igvuI4ogesjoNme-J_xmhGkvzNr1FPGfSnhqJBr1egQ/exec';
        
        let todosLosReportes = [];
        let reportesFiltrados = [];
        let charts = {};
        let reporteActual = null; // Para guardar el reporte que se está viendo en el modal

        // CARGAR DATOS AL INICIAR
        window.addEventListener('load', () => {
            inicializarFechas();
            cargarDatos();
        });

        function inicializarFechas() {
            const hoy = new Date();
            const hace30Dias = new Date();
            hace30Dias.setDate(hoy.getDate() - 30);
            
            document.getElementById('fechaDesde').value = hace30Dias.toISOString().split('T')[0];
            document.getElementById('fechaHasta').value = hoy.toISOString().split('T')[0];
        }


        // ── Helper: normaliza codigos sin importar el formato ──
        // Formato nuevo (array): [{codigo:"000123", cantidad:1}, ...]
        // Formato viejo (objeto): {"codigo1": 1, "codigo2": 2}
        function normalizarCodigos(raw) {
            if (!raw) return [];
            if (Array.isArray(raw)) {
                // Formato nuevo
                return raw.map(item => ({
                    codigo: String(item.codigo || item),
                    cantidad: Number(item.cantidad) || 1
                }));
            }
            if (typeof raw === 'object') {
                // Formato viejo
                return Object.entries(raw).map(([codigo, cantidad]) => ({
                    codigo: String(codigo),
                    cantidad: Number(cantidad) || 1
                }));
            }
            return [];
        }

       async function cargarDatos() {
    try {
        document.getElementById('tableContainer').innerHTML = 
            '<div class="loading">🔄 Cargando datos de la base de datos...</div>';
        
        console.log('📥 Cargando datos desde:', SHEET_URL);
        
        // Llamar a la API de Google Sheets
        const response = await fetch(SHEET_URL);
        
        if (!response.ok) {
            throw new Error('Error al conectar con la base de datos');
        }
        
        const data = await response.json();
        
        console.log('✅ Datos recibidos:', data);
        
        if (data.success && data.reportes) {
            // Normalizar fechas: quitar parte de hora "T03:00:00.000Z"
            todosLosReportes = data.reportes.map(r => ({
                ...r,
                fecha: r.fecha ? r.fecha.split('T')[0] : r.fecha,
                fecha_firma: r.fecha_firma ? r.fecha_firma.split('T')[0] : r.fecha_firma
            }));
            reportesFiltrados = [...todosLosReportes];
            
            if (todosLosReportes.length === 0) {
                document.getElementById('tableContainer').innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No hay reportes en la base de datos aún.<br>Genera tu primer reporte desde la app.</p></div>';
            } else {
                actualizarDashboard();
            }
        } else {
            throw new Error('No se pudieron cargar los datos');
        }
    } catch (error) {
        console.error('❌ Error al cargar datos:', error);
        document.getElementById('tableContainer').innerHTML = 
            '<div class="error">❌ Error al cargar los datos.<br><br>' +
            'Verifica que:<br>' +
            '1. La URL del Apps Script sea correcta<br>' +
            '2. La hoja de Google Sheets esté pública<br>' +
            '3. Haya reportes generados<br><br>' +
            '<button class="btn" onclick="location.reload()">🔄 Reintentar</button></div>';
    }
}

        

        function generarCodigosAleatorios() {
            const codigos = {};
            const numCodigos = Math.floor(Math.random() * 20 + 5);
            for (let i = 0; i < numCodigos; i++) {
                const codigo = 'ABC' + Math.floor(Math.random() * 1000).toString().padStart(3, '0');
                codigos[codigo] = Math.floor(Math.random() * 5 + 1);
            }
            return codigos;
        }

        function aplicarFiltros() {
            const fechaDesde = document.getElementById('fechaDesde').value;
            const fechaHasta = document.getElementById('fechaHasta').value;
            const bodega = document.getElementById('filtroBodega').value;
            
            reportesFiltrados = todosLosReportes.filter(r => {
                const cumpleFecha = (!fechaDesde || r.fecha >= fechaDesde) && 
                                   (!fechaHasta || r.fecha <= fechaHasta);
                const cumpleBodega = !bodega || r.bodega === bodega;
                return cumpleFecha && cumpleBodega;
            });
            
            actualizarDashboard();
        }

        function limpiarFiltros() {
            inicializarFechas();
            document.getElementById('filtroBodega').value = '';
            reportesFiltrados = [...todosLosReportes];
            actualizarDashboard();
        }

        function actualizarDashboard() {
            actualizarEstadisticas();
            actualizarGraficos();
            actualizarTabla();
            actualizarFiltroBodegas();
        }

        function actualizarEstadisticas() {
            const totalReportes = reportesFiltrados.length;
            const totalBultos = reportesFiltrados.reduce((sum, r) => sum + r.total_escaneos, 0);
            const sinCargas = reportesFiltrados.filter(r => r.sin_cargas).length;
            const encargadosUnicos = new Set(reportesFiltrados.map(r => r.encargado)).size;
            
            document.getElementById('totalReportes').textContent = totalReportes;
            document.getElementById('totalBultos').textContent = totalBultos.toLocaleString();
            document.getElementById('sinCargas').textContent = sinCargas;
            document.getElementById('encargadosActivos').textContent = encargadosUnicos;
        }

        function actualizarGraficos() {
            // GRÁFICO 1: CÓDIGOS ESCANEADOS POR DÍA (no reportes)
            const codigosPorDia = {};
            reportesFiltrados.forEach(r => {
                codigosPorDia[r.fecha] = (codigosPorDia[r.fecha] || 0) + r.total_escaneos;
            });
            
            const fechasOrdenadas = Object.keys(codigosPorDia).sort();
            const ultimos7Dias = fechasOrdenadas.slice(-7);
            
            crearGrafico('chartCodigosPorDia', 'line', 
                ultimos7Dias,
                ultimos7Dias.map(f => codigosPorDia[f]),
                'Códigos Escaneados', '#FF6600'
            );
            
            // GRÁFICO 2: CÓDIGOS ESCANEADOS POR BODEGA (no reportes)
            const codigosPorBodega = {};
            reportesFiltrados.forEach(r => {
                codigosPorBodega[r.bodega] = (codigosPorBodega[r.bodega] || 0) + r.total_escaneos;
            });
            
            // Calcular y mostrar total
            const totalCodigos = Object.values(codigosPorBodega).reduce((a, b) => a + b, 0);
            const bodegaFiltrada = document.getElementById('filtroBodega').value;
            
            let textoTotal = '';
            if (bodegaFiltrada) {
                // Si hay filtro de bodega, mostrar solo ese total
                const totalBodega = codigosPorBodega[bodegaFiltrada] || 0;
                textoTotal = `📦 Total ${bodegaFiltrada}: <strong style="color: #FF6600; font-size: 20px;">${totalBodega.toLocaleString()}</strong> códigos`;
            } else {
                // Si no hay filtro, mostrar total general
                textoTotal = `📦 Total General: <strong style="color: #FF6600; font-size: 20px;">${totalCodigos.toLocaleString()}</strong> códigos`;
                
                // Agregar desglose por bodega
                if (Object.keys(codigosPorBodega).length > 1) {
                    textoTotal += '<br><small style="color: #999;">';
                    Object.entries(codigosPorBodega).forEach(([bodega, total]) => {
                        textoTotal += `${bodega}: ${total.toLocaleString()} • `;
                    });
                    textoTotal = textoTotal.slice(0, -2) + '</small>';
                }
            }
            
            document.getElementById('totalBodegaDisplay').innerHTML = textoTotal;
            
            crearGrafico('chartCodigosPorBodega', 'doughnut',
                Object.keys(codigosPorBodega),
                Object.values(codigosPorBodega),
                'Códigos Escaneados', ['#FF6600', '#cc5200', '#FF8C42', '#FFA366', '#FFB380']
            );
        }

        function crearGrafico(id, tipo, labels, data, label, color) {
            const ctx = document.getElementById(id);
            
            if (charts[id]) {
                charts[id].destroy();
            }
            
            const config = {
                type: tipo,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: Array.isArray(color) ? color : color,
                        borderColor: tipo === 'line' ? color : 'transparent',
                        borderWidth: tipo === 'line' ? 2 : 0,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: tipo === 'doughnut'
                        }
                    },
                    scales: tipo !== 'doughnut' ? {
                        y: {
                            beginAtZero: true
                        }
                    } : {}
                }
            };
            
            charts[id] = new Chart(ctx, config);
        }

        function actualizarTabla() {
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Bodega</th>
                            <th>Encargado</th>
                            <th>Bultos</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${reportesFiltrados.slice(0, 20).map(r => `
                            <tr>
                                <td>${r.fecha}</td>
                                <td>${r.hora}</td>
                                <td>${r.bodega}</td>
                                <td>${r.encargado}</td>
                                <td>${r.total_escaneos}</td>
                                <td>
                                    <span class="badge ${r.sin_cargas ? 'badge-warning' : 'badge-success'}">
                                        ${r.sin_cargas ? 'Sin Cargas' : 'Completado'}
                                    </span>
                                </td>
                                <td>
                                    <button class="btn-ver-detalle" onclick='verDetalle(${JSON.stringify(r).replace(/'/g, "&#39;")})'>
                                        👁️ Ver Detalle
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                ${reportesFiltrados.length === 0 ? 
                    '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No hay reportes para mostrar</p></div>' : ''}
            `;
            
            document.getElementById('tableContainer').innerHTML = html;
        }

        function actualizarFiltroBodegas() {
            const bodegas = [...new Set(todosLosReportes.map(r => r.bodega))];
            const select = document.getElementById('filtroBodega');
            const valorActual = select.value;
            
            select.innerHTML = '<option value="">Todas las bodegas</option>' +
                bodegas.map(b => `<option value="${b}">${b}</option>`).join('');
            
            select.value = valorActual;
        }

        function exportarExcel() {
            alert('Función de exportar en desarrollo.\nPor ahora puedes usar Google Sheets directamente para exportar.');
        }

        // FUNCIONES PARA VER DETALLE DE REPORTE
        function verDetalle(reporte) {
            reporteActual = reporte; // Guardar para exportar después
            
            const modal = document.getElementById('modalDetalle');
            const modalBody = document.getElementById('modalBody');
            
            // Construir HTML del detalle
            let html = `
                <!-- INFORMACIÓN GENERAL -->
                <div class="detail-section">
                    <h3>📋 Información General</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="detail-label">ID Reporte</div>
                            <div class="detail-value">#${reporte.id}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Fecha</div>
                            <div class="detail-value">${reporte.fecha}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Hora de Generación</div>
                            <div class="detail-value">${reporte.hora}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Bodega</div>
                            <div class="detail-value">${reporte.bodega}</div>
                        </div>
                    </div>
                </div>

                <!-- FIRMA -->
                <div class="detail-section">
                    <h3>✍️ Firma de Recepción</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="detail-label">Encargado</div>
                            <div class="detail-value">${reporte.encargado}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Fecha de Firma</div>
                            <div class="detail-value">${reporte.fecha_firma || reporte.fecha}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Hora de Firma</div>
                            <div class="detail-value">${reporte.hora_firma || reporte.hora}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Fotografía</div>
                            <div class="detail-value">${reporte.tiene_foto ? '✅ Sí' : '❌ No'}</div>
                        </div>
                    </div>
                </div>

                <!-- ESTADÍSTICAS -->
                <div class="detail-section">
                    <h3>📊 Estadísticas del Escaneo</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="detail-label">Total de Escaneos</div>
                            <div class="detail-value" style="color: #FF6600; font-size: 24px;">${reporte.total_escaneos}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Bultos Únicos</div>
                            <div class="detail-value" style="color: #2196f3; font-size: 24px;">${reporte.bultos_unicos}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Multibultos</div>
                            <div class="detail-value" style="color: #4caf50; font-size: 24px;">${reporte.multibultos}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Estado</div>
                            <div class="detail-value">
                                <span class="badge ${reporte.sin_cargas ? 'badge-warning' : 'badge-success'}">
                                    ${reporte.sin_cargas ? '⚠️ Sin Cargas' : '✅ Completado'}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Si NO es "sin cargas", mostrar tabla de códigos
            const _codigosNorm = normalizarCodigos(reporte.codigos);
            if (!reporte.sin_cargas && _codigosNorm.length > 0) {
                const codigosArray = _codigosNorm.sort((a, b) => b.cantidad - a.cantidad);

                html += `
                    <!-- CÓDIGOS ESCANEADOS -->
                    <div class="detail-section">
                        <h3>📦 Códigos Escaneados (${codigosArray.length} únicos)</h3>
                        <table class="codigos-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Código</th>
                                    <th>Cantidad</th>
                                    <th>Tipo</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${codigosArray.map((item, index) => `
                                    <tr>
                                        <td>${index + 1}</td>
                                        <td><strong>${item.codigo}</strong></td>
                                        <td>${item.cantidad}</td>
                                        <td>
                                            <span class="badge ${item.cantidad > 1 ? 'badge-warning' : 'badge-success'}">
                                                ${item.cantidad > 1 ? 'Multibulto' : 'Único'}
                                            </span>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } else if (reporte.sin_cargas) {
                html += `
                    <div class="detail-section" style="background: #fff3cd; border-left: 4px solid #ffc107;">
                        <h3 style="color: #856404;">⚠️ Reporte Sin Cargas Disponibles</h3>
                        <p style="color: #856404; margin: 10px 0;">
                            El transporte llegó a la bodega pero no había paquetes disponibles para cargar.
                            Este reporte sirve como evidencia de la visita.
                        </p>
                    </div>
                `;
            }

            modalBody.innerHTML = html;
            modal.classList.add('show');
            
            // Cerrar modal al hacer click fuera
            modal.onclick = function(event) {
                if (event.target === modal) {
                    cerrarModal();
                }
            };
        }

        function cerrarModal() {
            const modal = document.getElementById('modalDetalle');
            modal.classList.remove('show');
        }

        // Cerrar modal con tecla ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                cerrarModal();
            }
        });

        // FUNCIÓN PARA EXPORTAR DETALLE A EXCEL
        function exportarDetalleExcel() {
            if (!reporteActual) {
                alert('No hay reporte seleccionado');
                return;
            }

            try {
                const r = reporteActual;
                
                // Crear un nuevo libro de Excel
                const wb = XLSX.utils.book_new();

                // HOJA 1: INFORMACIÓN GENERAL Y ESTADÍSTICAS
                const datosGenerales = [
                    ['BIGTICKET LOGÍSTICA Y TRANSPORTE'],
                    ['DETALLE DE REPORTE DE ESCANEO'],
                    [''],
                    ['INFORMACIÓN GENERAL'],
                    ['ID Reporte:', r.id],
                    ['Fecha:', r.fecha],
                    ['Hora de Generación:', r.hora],
                    ['Bodega:', r.bodega],
                    [''],
                    ['FIRMA DE RECEPCIÓN'],
                    ['Encargado:', r.encargado],
                    ['Fecha de Firma:', r.fecha_firma || r.fecha],
                    ['Hora de Firma:', r.hora_firma || r.hora],
                    ['Fotografía:', r.tiene_foto ? 'Sí' : 'No'],
                    [''],
                    ['ESTADÍSTICAS'],
                    ['Total de Escaneos:', r.total_escaneos],
                    ['Bultos Únicos:', r.bultos_unicos],
                    ['Multibultos:', r.multibultos],
                    ['Estado:', r.sin_cargas ? 'Sin Cargas Disponibles' : 'Completado']
                ];

                const wsGeneral = XLSX.utils.aoa_to_sheet(datosGenerales);
                
                // Estilo para encabezados
                wsGeneral['A1'].s = { font: { bold: true, sz: 14 } };
                wsGeneral['A2'].s = { font: { bold: true, sz: 12 } };
                
                XLSX.utils.book_append_sheet(wb, wsGeneral, 'Resumen');

                // HOJA 2: CÓDIGOS ESCANEADOS (solo si no es "sin cargas")
                const _exportCodigos = normalizarCodigos(r.codigos);
                if (!r.sin_cargas && _exportCodigos.length > 0) {
                    const codigosArray = [
                        ['#', 'CÓDIGO', 'CANTIDAD', 'TIPO']
                    ];
                    
                    const codigosOrdenados = _exportCodigos.sort((a, b) => b.cantidad - a.cantidad);
                    
                    codigosOrdenados.forEach((item, index) => {
                        // Forzar tipo texto en Excel para preservar ceros iniciales
                        codigosArray.push([
                            index + 1,
                            { t: 's', v: String(item.codigo) }, // tipo texto para preservar 000123
                            item.cantidad,
                            item.cantidad > 1 ? 'Multibulto' : 'Único'
                        ]);
                    });
                    
                    // Agregar totales al final
                    codigosArray.push([]);
                    codigosArray.push(['TOTALES']);
                    codigosArray.push(['Total Códigos Únicos:', codigosOrdenados.length]);
                    codigosArray.push(['Total Escaneos:', r.total_escaneos]);
                    codigosArray.push(['Bultos Únicos:', r.bultos_unicos]);
                    codigosArray.push(['Multibultos:', r.multibultos]);

                    const wsCodigos = XLSX.utils.aoa_to_sheet(codigosArray);
                    XLSX.utils.book_append_sheet(wb, wsCodigos, 'Códigos Escaneados');
                } else if (r.sin_cargas) {
                    // Si es sin cargas, agregar hoja explicativa
                    const sinCargasData = [
                        ['SIN CARGAS DISPONIBLES'],
                        [''],
                        ['El transporte llegó a la bodega pero no había paquetes'],
                        ['disponibles para cargar.'],
                        [''],
                        ['Este reporte sirve como evidencia de la visita.'],
                        [''],
                        ['Fecha de visita:', r.fecha],
                        ['Hora de visita:', r.hora],
                        ['Encargado:', r.encargado],
                        ['Fotografía de evidencia:', r.tiene_foto ? 'Sí' : 'No']
                    ];
                    
                    const wsSinCargas = XLSX.utils.aoa_to_sheet(sinCargasData);
                    XLSX.utils.book_append_sheet(wb, wsSinCargas, 'Sin Cargas');
                }

                // Generar nombre del archivo
                const bodegaLimpia = r.bodega.replace(/[\/\\]/g, '-');
                const nombreArchivo = `Reporte_${bodegaLimpia}_${r.fecha}_ID${r.id}.xlsx`;

                // Descargar el archivo
                XLSX.writeFile(wb, nombreArchivo);

                // Mensaje de éxito
                setTimeout(() => {
                    alert('✅ Excel descargado correctamente:\n' + nombreArchivo);
                }, 100);

            } catch (error) {
                console.error('Error al exportar:', error);
                alert('❌ Error al generar el Excel. Por favor intenta de nuevo.');
            }
        }
    </script>
